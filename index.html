<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Mansion</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            touch-action: none; 
            font-family: 'Segoe UI', sans-serif; 
        }
        #ui { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            pointer-events: none; 
        }
        #crosshair { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #0f0; 
            font-size: 32px; 
            opacity: 0.9; 
            pointer-events: none; 
            display: none; 
        }
        #players-list { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #0ff; 
            background: rgba(0,0,0,0.7); 
            padding: 12px 16px; 
            border-radius: 10px; 
            font-size: 15px; 
            border: 1px solid #0ff; 
        }

        #back-lobby-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 0, 255, 0.9);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            pointer-events: auto;
            box-shadow: 0 0 20px #ff00ff;
        }
        #back-lobby-btn:hover {
            background: #ff00ff;
            transform: scale(1.05);
        }

        #login-screen { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #111, #000); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            color: white; 
            z-index: 30; 
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="crosshair">+</div>
    <div id="players-list">Ninjas Online: <span id="player-count">0</span></div>
    <button id="back-lobby-btn">← BACK TO LOBBY</button>
</div>

<div id="login-screen">
    <h1 style="color:#0ff; text-shadow: 0 0 15px #0ff;">NINJA MANSION</h1>
    <p id="login-status" style="color:#ff00ff; margin:25px 0;">Please go to Lobby first</p>
    <button id="go-lobby-btn" style="padding:14px 40px; font-size:18px; background:#00ff88; color:#000; border:none; border-radius:50px; cursor:pointer;">
        GO TO LOBBY
    </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyA1gnwY8WzLbbAX2ROsJ7gJXrNOZEiecpE",
  authDomain: "blogtestenviroment.firebaseapp.com",
  databaseURL: "https://blogtestenviroment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blogtestenviroment",
  appId: "1:26504116566:web:63ca512dac2126a6b1fef7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let playerId = null, playerName = "";
let ninjaOutfit = { skin: 0x050505, eyes: 0x00ffff };
let otherPlayers = {};

let scene, camera, renderer, player, clock, torch;
let keys = { up: false, down: false, left: false, right: false };
let velY = 0, grounded = true, yaw = 0, pitch = 0;

const loginScreen = document.getElementById('login-screen');
const crosshair = document.getElementById('crosshair');
const backLobbyBtn = document.getElementById('back-lobby-btn');
const goLobbyBtn = document.getElementById('go-lobby-btn');

// ==================== DIRECT ACCESS BLOCK ====================
function checkAccess() {
    // Agar user lobby se nahi aaya (direct index.html khola), toh lobby par bhej do
    if (!document.referrer || !document.referrer.includes('lobby.html')) {
        alert("Please start the game from the Neon Ninja Lobby!");
        window.location.href = 'lobby.html';
        return false;
    }
    return true;
}

// Back to Lobby Button
backLobbyBtn.addEventListener('click', () => {
    if (confirm("Go back to Neon Ninja Lobby?")) {
        window.location.href = 'lobby.html';
    }
});

goLobbyBtn.addEventListener('click', () => {
    window.location.href = 'lobby.html';
});

// Check access on load
if (!checkAccess()) {
    // Agar direct access hai toh yahan se code ruk jayega
} else {
    // Normal flow from lobby
    auth.onAuthStateChanged((user) => {
        if (user) {
            playerId = user.uid;
            playerName = user.displayName || "NeonNinja";

            db.ref('player/outfit').once('value', (snap) => {
                if (snap.val()) ninjaOutfit = snap.val();
                
                loginScreen.style.display = 'none';
                crosshair.style.display = 'block';
                initGame();
            });
        } else {
            // Rare case - not signed in
            loginScreen.style.display = 'flex';
        }
    });
}

// ==================== GAME FUNCTIONS ====================
function initGame() {
    scene = new THREE.Scene();
    clock = new THREE.Clock();
    scene.background = new THREE.Color(0x020205);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));

    torch = new THREE.SpotLight(0xffffff, 5, 50, Math.PI/6);
    scene.add(torch);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    player = new THREE.Group();
    player.position.set(0, 1.7, 15);
    scene.add(player);

    createMansion();
    setupControls();
    setupMultiplayer();
    animate();
}

function createNinjaMesh(outfit) {
    const group = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: outfit.skin || 0x050505 });
    const neonMat = new THREE.MeshBasicMaterial({ color: outfit.eyes || 0x00ffff });

    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.8), skinMat);
    body.position.y = 0.4; group.add(body);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.18), skinMat);
    head.position.y = 0.9; group.add(head);

    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 0.06), neonMat);
    eye.position.set(0, 0.95, 0.16); group.add(eye);

    return group;
}

function createMansion() {
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const box = new THREE.Mesh(new THREE.BoxGeometry(40, 15, 40), wallMat);
    box.position.y = 7.5;
    scene.add(box);
}

function setupControls() {
    const bind = (id, k) => {
        const el = document.getElementById(id);
        if(el) {
            el.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; });
            el.addEventListener('touchend', () => keys[k] = false);
        }
    };
    bind('btn-up','up'); bind('btn-down','down'); bind('btn-left','left'); bind('btn-right','right');

    document.getElementById('jump-btn')?.addEventListener('touchstart', () => { if(grounded) velY = 0.35; });
    document.getElementById('torch-btn')?.addEventListener('touchstart', () => { 
        if(torch) torch.intensity = torch.intensity > 0 ? 0 : 8; 
    });

    let lx, ly;
    window.addEventListener('touchstart', e => {
        if(e.touches[0].clientX > window.innerWidth * 0.5) {
            lx = e.touches[0].clientX;
            ly = e.touches[0].clientY;
        }
    });
    window.addEventListener('touchmove', e => {
        if(!lx) return;
        yaw -= (e.touches[0].clientX - lx) * 0.006;
        pitch = Math.max(-1.4, Math.min(1.4, pitch - (e.touches[0].clientY - ly) * 0.006));
        lx = e.touches[0].clientX;
        ly = e.touches[0].clientY;
    });
}

function setupMultiplayer() {
    const playersRef = db.ref('players');
    
    setInterval(() => {
        if (!playerId || !player) return;
        playersRef.child(playerId).set({
            name: playerName,
            pos: { x: player.position.x, y: player.position.y, z: player.position.z },
            yaw: yaw,
            outfit: ninjaOutfit,
            t: Date.now()
        });
    }, 60);

    playersRef.on('value', (snap) => {
        const data = snap.val() || {};
        for (let id in data) {
            if (id === playerId) continue;
            const p = data[id];
            if (!otherPlayers[id]) {
                otherPlayers[id] = createNinjaMesh(p.outfit || ninjaOutfit);
                scene.add(otherPlayers[id]);
            }
            otherPlayers[id].position.set(p.pos.x, p.pos.y - 1.2, p.pos.z);
            otherPlayers[id].rotation.y = p.yaw || 0;
        }
        document.getElementById('player-count').innerText = Object.keys(data).length;
    });
}

function animate() {
    requestAnimationFrame(animate);
    if (!player || !camera || !renderer) return;

    const speed = 0.18;
    let dx = 0, dz = 0;

    if(keys.up)    { dx -= Math.sin(yaw); dz -= Math.cos(yaw); }
    if(keys.down)  { dx += Math.sin(yaw); dz += Math.cos(yaw); }
    if(keys.left)  { dx -= Math.cos(yaw); dz += Math.sin(yaw); }
    if(keys.right) { dx += Math.cos(yaw); dz -= Math.sin(yaw); }

    player.position.x += dx * speed;
    player.position.z += dz * speed;

    player.position.y += velY;
    if (player.position.y > 1.7) {
        velY -= 0.018;
        grounded = false;
    } else {
        player.position.y = 1.7;
        velY = 0;
        grounded = true;
    }

    camera.position.copy(player.position);
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    if (torch) {
        torch.position.copy(camera.position);
        torch.target.position.set(camera.position.x - Math.sin(yaw)*20, camera.position.y - 2, camera.position.z - Math.cos(yaw)*20);
        torch.target.updateMatrixWorld();
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});
</script>
</body>
</html>
