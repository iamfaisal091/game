<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPS Mansion - Online Multiplayer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0">
<meta name="theme-color" content="#0f0">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 34px; opacity: 0.9; text-shadow: 0 0 15px #0f0; pointer-events: none; display: none; }

        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; 
            flex-direction: column; color: white; z-index: 30;
        }
        #login-btn {
            padding: 16px 45px; font-size: 22px; background: #4285F4; color: white; 
            border: none; border-radius: 10px; cursor: pointer;
        }

        #players-list { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 10px; font-size: 15px; 
        }

        #clock-ui { position: absolute; top: 20px; right: 20px; color: white; background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 14px; font-weight: bold; font-size: 18px; pointer-events: none; }

        #stats { 
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.78); padding: 14px 28px; border-radius: 16px; 
            display: flex; gap: 32px; pointer-events: none;
        }
        .stat { color: white; font-size: 15px; text-align: center; }
        .bar-container { height: 11px; width: 120px; background: #1a1a1a; border-radius: 8px; overflow: hidden; margin-top: 5px; }
        .bar { height: 100%; transition: width 0.5s ease; }
        .value { font-size: 13px; margin-top: 3px; color: #ccc; font-weight: 500; }

        #controls { 
            position: absolute; bottom: 25px; left: 25px; 
            display: grid; grid-template-columns: repeat(3, 70px); gap: 14px; pointer-events: auto; 
        }
        .btn { 
            width: 70px; height: 70px; background: rgba(0,0,0,0.75); color: white; 
            border: 3px solid #fff; border-radius: 18px; display: flex; 
            align-items: center; justify-content: center; font-size: 32px; 
        }

        #action-zone { 
            position: absolute; bottom: 28px; right: 28px; 
            display: flex; flex-direction: column; gap: 18px; pointer-events: auto; 
        }
        .round-btn { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.25); 
            border: 3.5px solid #fff; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; color: white; 
            font-size: 13.5px; font-weight: bold; 
        }

        #inventory { 
            position: absolute; bottom: 215px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 16px 30px; border-radius: 18px; 
            display: none; flex-direction: row; gap: 28px; pointer-events: auto;
        }
        .inv-slot {
            width: 68px; height: 68px; background: rgba(255,255,255,0.2); 
            border: 2.5px solid #fff; border-radius: 16px; display: flex;
            align-items: center; justify-content: center; font-size: 36px; 
        }

        #get-btn { 
            position: absolute; bottom: 295px; left: 50%; transform: translateX(-50%);
            background: #00ff66; color: black; padding: 16px 38px; border-radius: 50px; 
            font-weight: bold; font-size: 18px; display: none; pointer-events: auto;
            box-shadow: 0 0 30px #0f0;
        }
    </style>
</head>
<!-- PWA Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered!', reg))
                .catch(err => console.log('Service Worker Error:', err));
        });
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>
<body>

<div id="ui">
    <div id="crosshair">+</div>
    <div id="clock-ui">Time: <span id="time-val">12:00</span></div>
    <div id="players-list">Players: <span id="player-count">1</span></div>

    <div id="stats">
        <div class="stat">❤️ Health<div class="bar-container"><div id="health-bar" class="bar" style="width:100%"></div></div><div class="value" id="health-val">100</div></div>
        <div class="stat">🍖 Hunger<div class="bar-container"><div id="hunger-bar" class="bar" style="width:100%"></div></div><div class="value" id="hunger-val">100</div></div>
        <div class="stat">💧 Thirst<div class="bar-container"><div id="thirst-bar" class="bar" style="width:100%"></div></div><div class="value" id="thirst-val">100</div></div>
    </div>

    <div id="controls">
        <div class="btn" style="grid-column:2" id="btn-up">▲</div>
        <div class="btn" style="grid-column:1; grid-row:2" id="btn-left">◀</div>
        <div class="btn" style="grid-column:2; grid-row:2" id="btn-down">▼</div>
        <div class="btn" style="grid-column:3; grid-row:2" id="btn-right">▶</div>
    </div>

    <div id="action-zone">
        <div id="torch-btn" class="round-btn">TORCH</div>
        <div id="jump-btn" class="round-btn">JUMP</div>
        <div id="inv-btn" class="round-btn">INV</div>
    </div>

    <div id="inventory"></div>
    <div id="get-btn">GET FOOD & WATER</div>
</div>

<!-- Login Screen -->
<div id="login-screen">
    <h1>FPS Mansion Online</h1>
    <button id="login-btn">Sign in with Google</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyA1gnwY8WzLbbAX2ROsJ7gJXrNOZEiecpE",
  authDomain: "blogtestenviroment.firebaseapp.com",
  databaseURL: "https://blogtestenviroment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blogtestenviroment",
  storageBucket: "blogtestenviroment.firebasestorage.app",
  messagingSenderId: "26504116566",
  appId: "1:26504116566:web:63ca512dac2126a6b1fef7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let playerId = null;
let playerName = "";
let otherPlayers = {};

// Game Variables
let scene, camera, renderer, player, clock, sunLight, houseLight, torch;
let keys = { up: false, down: false, left: false, right: false };
let velY = 0, grounded = true, yaw = 0, pitch = 0;
let gameTime = 0, dayDuration = 480;
let doorHinge, walls = [];
let health = 100, hunger = 100, thirst = 100;
let lastDrain = Date.now();
let inventory = { food: 0, water: 0 };
let shopNear = false;

document.getElementById('login-btn').addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
        .then((result) => {
            playerId = result.user.uid;
            playerName = result.user.displayName || "Player";
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            initGame();
        })
        .catch((error) => alert("Login failed: " + error.message));
});

function initGame() {
    scene = new THREE.Scene();
    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    sunLight = new THREE.DirectionalLight(0xffffff, 1);
    scene.add(sunLight);

    torch = new THREE.SpotLight(0xffffcc, 0, 42, Math.PI/6, 0.35);
    scene.add(torch);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({ color: 0x113311 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    player = new THREE.Group();
    player.position.set(0, 1.7, 32);
    scene.add(player);

    createMansion();
    createShopOutside();
    setupControls();
    setupMultiplayer();
    animate();
}

function createMansion() {
    const house = new THREE.Group();
    const wallMat = new THREE.MeshLambertMaterial({ color: 0xdddddd });

    house.add(new THREE.Mesh(new THREE.BoxGeometry(20, 0.2, 20), new THREE.MeshLambertMaterial({color: 0x222222})).translateY(-1.6));
    house.add(new THREE.Mesh(new THREE.BoxGeometry(21, 0.6, 21), wallMat).translateY(8));

    const wallG = new THREE.BoxGeometry(20, 10, 0.5);
    house.add(new THREE.Mesh(wallG, wallMat).translateY(3.4).translateZ(-10));

    const sideG = new THREE.BoxGeometry(0.5, 10, 20);
    house.add(new THREE.Mesh(sideG, wallMat).translateX(-10).translateY(3.4));
    house.add(new THREE.Mesh(sideG, wallMat).translateX(10).translateY(3.4));

    const front = new THREE.Mesh(new THREE.BoxGeometry(8, 10, 0.5), wallMat);
    front.position.set(-6, 3.4, 10); house.add(front);
    const front2 = front.clone(); front2.position.x = 6; house.add(front2);

    doorHinge = new THREE.Group();
    doorHinge.position.set(-2, -1.6, 10);
    const door = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 0.25), new THREE.MeshLambertMaterial({color: 0x552211}));
    door.position.set(2, 3, 0);
    doorHinge.add(door);
    house.add(doorHinge);

    walls = [
        {x:0,z:-10,width:20,depth:1},{x:-10,z:0,width:1,depth:20},{x:10,z:0,width:1,depth:20},
        {x:-6,z:10,width:8,depth:1},{x:6,z:10,width:8,depth:1}
    ];

    houseLight = new THREE.PointLight(0xffaa44, 0, 18);
    houseLight.position.set(0, 5, 0);
    house.add(houseLight);

    house.position.set(0, 0, -15);
    scene.add(house);
}

function createShopOutside() {
    const shop = new THREE.Mesh(new THREE.BoxGeometry(4.5, 1.6, 4.5), new THREE.MeshLambertMaterial({color: 0x00cc33}));
    shop.position.set(23, 0.8, -14);
    scene.add(shop);
}

function checkCollision(newX, newZ) {
    const hx = 0, hz = -15;
    const px = newX - hx, pz = newZ - hz;
    for (let w of walls) {
        if (Math.abs(px - w.x) < w.width/2 + 1.4 && Math.abs(pz - w.z) < w.depth/2 + 1.4) return true;
    }
    return false;
}

function setupControls() {
    const bind = (id, k) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; });
        el.addEventListener('touchend', () => keys[k] = false);
    };
    bind('btn-up','up'); bind('btn-down','down'); bind('btn-left','left'); bind('btn-right','right');

    document.getElementById('jump-btn').addEventListener('touchstart', () => { if(grounded) velY = 0.39; });
    document.getElementById('torch-btn').addEventListener('touchstart', () => { torch.intensity = torch.intensity > 0 ? 0 : 5.5; });

    document.getElementById('inv-btn').addEventListener('touchstart', () => {
        const inv = document.getElementById('inventory');
        inv.style.display = (inv.style.display === 'flex') ? 'none' : 'flex';
        renderInventory();
    });

    let lx, ly;
    window.addEventListener('touchstart', e => {
        if(e.touches[0].clientX > window.innerWidth/2) { lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
    });
    window.addEventListener('touchmove', e => {
        if(!lx) return;
        yaw -= (e.touches[0].clientX - lx) * 0.005;
        pitch = Math.max(-1.25, Math.min(1.25, pitch - (e.touches[0].clientY - ly)*0.005));
        lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    });
    window.addEventListener('touchend', () => lx = undefined);
}

function renderInventory() {
    const div = document.getElementById('inventory');
    div.innerHTML = `
        <div class="inv-slot" onclick="useItem('food')">🍖 ${inventory.food}</div>
        <div class="inv-slot" onclick="useItem('water')">💧 ${inventory.water}</div>
    `;
}

window.useItem = function(type) {
    if (type === 'food' && inventory.food > 0) {
        hunger = Math.min(100, hunger + 32);
        inventory.food--;
    }
    if (type === 'water' && inventory.water > 0) {
        thirst = Math.min(100, thirst + 35);
        inventory.water--;
    }
    renderInventory();
    updateBars();
};

function updateBars() {
    document.getElementById('health-bar').style.width = health + '%';
    document.getElementById('hunger-bar').style.width = hunger + '%';
    document.getElementById('thirst-bar').style.width = thirst + '%';
    document.getElementById('health-val').innerText = Math.floor(health);
    document.getElementById('hunger-val').innerText = Math.floor(hunger);
    document.getElementById('thirst-val').innerText = Math.floor(thirst);
}

function updateDayNight() {
    gameTime += clock.getDelta();
    const cycle = (gameTime % dayDuration) / dayDuration;

    const sunAngle = cycle * Math.PI * 2 - Math.PI/2;
    sunLight.position.set(Math.cos(sunAngle) * 180, Math.sin(sunAngle) * 140 + 30, Math.sin(sunAngle) * 40);

    let skyColor, sunIntensity;
    if (cycle < 0.2 || cycle > 0.8) {
        skyColor = new THREE.Color(0x010108);
        sunIntensity = 0.08;
        houseLight.intensity = 3.2;
    } else if (cycle > 0.32 && cycle < 0.68) {
        skyColor = new THREE.Color(0x88ccff);
        sunIntensity = 1.4;
        houseLight.intensity = 0;
    } else {
        skyColor = new THREE.Color(0xff8855);
        sunIntensity = 0.85;
        houseLight.intensity = 1.2;
    }

    scene.background = skyColor;
    sunLight.intensity = sunIntensity;

    let hours = Math.floor(cycle * 24);
    let mins = Math.floor((cycle * 1440) % 60);
    document.getElementById('time-val').innerText = `\( {hours.toString().padStart(2,'0')}: \){mins.toString().padStart(2,'0')}`;
}

function updateSurvival() {
    const now = Date.now();
    if (now - lastDrain > 650) {
        hunger = Math.max(0, hunger - 0.135);
        thirst = Math.max(0, thirst - 0.195);
        if (hunger < 12) health -= 0.11;
        if (thirst < 12) health -= 0.16;
        health = Math.max(0, health);
        lastDrain = now;
        updateBars();
    }

    const dist = Math.hypot(player.position.x - 23, player.position.z + 14);
    const getBtn = document.getElementById('get-btn');
    if (dist < 7.5) {
        getBtn.style.display = 'block';
        shopNear = true;
    } else {
        getBtn.style.display = 'none';
        shopNear = false;
    }
}

document.getElementById('get-btn').addEventListener('touchstart', function() {
    if (!shopNear) return;
    inventory.food += 1;
    inventory.water += 1;
    renderInventory();
    hunger = Math.min(100, hunger + 26);
    thirst = Math.min(100, thirst + 30);
    updateBars();
    this.style.background = '#ffff00';
    setTimeout(() => this.style.background = '#00ff66', 300);
});

function setupMultiplayer() {
    const playersRef = db.ref('players');

    setInterval(() => {
        if (!playerId) return;
        playersRef.child(playerId).set({
            name: playerName,
            position: { x: player.position.x, y: player.position.y, z: player.position.z },
            yaw: yaw,
            timestamp: Date.now()
        });
    }, 60);

    playersRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        let count = 0;

        for (let id in data) {
            if (id === playerId) continue;
            count++;

            const p = data[id];
            if (!otherPlayers[id]) {
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(1.4, 2.6, 1.4),
                    new THREE.MeshLambertMaterial({ color: 0xffaa00 })
                );
                scene.add(box);
                otherPlayers[id] = box;
            }
            otherPlayers[id].position.set(p.position.x, p.position.y, p.position.z);
            otherPlayers[id].rotation.y = p.yaw || 0;
        }
        document.getElementById('player-count').innerText = Object.keys(data).length;
    });

    window.addEventListener('beforeunload', () => {
        if (playerId) playersRef.child(playerId).remove();
    });
}

function animate() {
    requestAnimationFrame(animate);
    updateDayNight();
    updateSurvival();

    const speed = 0.23;
    let dx = 0, dz = 0;

    if(keys.up)    { dx -= Math.sin(yaw); dz -= Math.cos(yaw); }
    if(keys.down)  { dx += Math.sin(yaw); dz += Math.cos(yaw); }
    if(keys.left)  { dx -= Math.cos(yaw); dz += Math.sin(yaw); }
    if(keys.right) { dx += Math.cos(yaw); dz -= Math.sin(yaw); }

    if (dx || dz) {
        const len = Math.sqrt(dx*dx + dz*dz) || 1;
        const newX = player.position.x + (dx/len)*speed;
        const newZ = player.position.z + (dz/len)*speed;

        if (!checkCollision(newX, newZ)) {
            player.position.x = newX;
            player.position.z = newZ;
        }
    }

    player.position.y += velY;
    if (player.position.y > 1.7) velY -= 0.023;
    else { player.position.y = 1.7; velY = 0; }

    const dist = player.position.distanceTo(new THREE.Vector3(0,1.7,-4));
    doorHinge.rotation.y = THREE.MathUtils.lerp(doorHinge.rotation.y, (dist < 6) ? -Math.PI/1.6 : 0, 0.12);

    camera.position.copy(player.position);
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    torch.position.copy(camera.position);
    torch.target.position.set(
        camera.position.x - Math.sin(yaw)*13,
        camera.position.y + Math.sin(pitch)*9,
        camera.position.z - Math.cos(yaw)*13
    );
    torch.target.updateMatrixWorld();

    renderer.render(scene, camera);
}
</script>
</body>
</html>
