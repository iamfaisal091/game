<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Ninja Pro Lobby</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000 url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjmCQYPcaaAS-4bAgsUX7xfixWXMQHCoOF5xb98UaY2-_mjIK6KvIzGnnqy7GTacldnk2KX0EVPvfYAzCepUsMYgWALxLLo8mAy_EmMJumfmFLL-uU4dL4iHmMKRkB6ntXvNNU5ECzrzcyzZisz5NkGMNA0BUsXUsKnaDTZeHFce8wWvdT95w_JxVh5hSk/s1280/1000131370.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 30;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        #title {
            font-size: 52px;
            color: #00ffff;
            text-shadow: 0 0 30px #00ffff;
            margin-bottom: 10px;
        }
        #status {
            font-size: 20px;
            color: #ff00ff;
            margin: 20px 0 40px 0;
            text-shadow: 0 0 15px #ff00ff;
        }
        button {
            pointer-events: auto;
            padding: 16px 55px;
            margin: 12px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px currentColor;
            transition: all 0.3s;
        }
        #signin-btn {
            background: #4285f4;
            color: white;
        }
        #start-game-btn {
            background: linear-gradient(#00ff88, #00cc66);
            color: #000;
            display: none;
        }
        button:hover {
            transform: scale(1.08);
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="title">NEON NINJA</div>
        <div id="status">Welcome to the Lobby</div>
        
        <button id="signin-btn">SIGN IN WITH GOOGLE</button>
        <button id="start-game-btn">START GAME</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1gnwY8WzLbbAX2ROsJ7gJXrNOZEiecpE",
            authDomain: "blogtestenviroment.firebaseapp.com",
            databaseURL: "https://blogtestenviroment-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "blogtestenviroment",
            appId: "1:26504116566:web:63ca512dac2126a6b1fef7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let scene, camera, renderer, charGroup;
        let materials = {}, eyes = [], mouth;
        let fireParticles = [], fireSystem = []; 
        let clock = new THREE.Clock();

        let playerId = null;
        let playerName = "";

        const signinBtn = document.getElementById('signin-btn');
        const startBtn = document.getElementById('start-game-btn');
        const statusText = document.getElementById('status');

        init();
        animate();
        listenOutfit();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.8, 4.2);
            camera.lookAt(0, 1.2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x020202, metalness: 1, roughness: 0.1 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            charGroup = new THREE.Group();
            materials.skin = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.3, metalness: 0.8 });
            materials.neonEyes = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            materials.pinkFist = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 2 });
            materials.blueFire = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });

            // Torso & Head
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.16, 0.7, 32), materials.skin);
            torso.position.y = 1.2; charGroup.add(torso);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 32, 32), materials.skin);
            head.position.y = 1.65; charGroup.add(head);

            // Eyes & Mouth
            const eyeGeo = new THREE.PlaneGeometry(0.05, 0.015);
            const lEye = new THREE.Mesh(eyeGeo, materials.neonEyes);
            lEye.position.set(-0.05, 1.68, 0.151); charGroup.add(lEye);
            const rEye = lEye.clone(); rEye.position.x = 0.05; charGroup.add(rEye);
            eyes.push(lEye, rEye);

            mouth = new THREE.Mesh(new THREE.PlaneGeometry(0.04, 0.008), materials.neonEyes);
            mouth.position.set(0, 1.60, 0.151); charGroup.add(mouth);

            // Arms with Fire
            const createArm = (side) => {
                const g = new THREE.Group();
                const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.4), materials.skin);
                arm.position.set(side * 0.25, 1.25, 0); arm.rotation.z = side * 0.2; g.add(arm);
                
                const fist = new THREE.Mesh(new THREE.SphereGeometry(0.075, 16, 16), materials.pinkFist);
                fist.position.set(side * 0.31, 1.0, 0); g.add(fist);

                const fSource = new THREE.Object3D();
                fSource.position.set(side * 0.31, 1.0, 0);
                charGroup.add(fSource);
                fireSystem.push({ source: fSource, side: side });

                return g;
            };
            charGroup.add(createArm(1), createArm(-1));

            // Legs
            const createLeg = (side) => {
                const g = new THREE.Group();
                const leg = new THREE.Mesh(new THREE.CapsuleGeometry(0.085, 0.75), materials.skin);
                leg.position.set(side * 0.12, 0.5, 0); g.add(leg);
                const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.12, 0.26), materials.neonEyes);
                shoe.position.set(side * 0.12, 0.06, 0.05); g.add(shoe);
                return g;
            };
            charGroup.add(createLeg(1), createLeg(-1));
            scene.add(charGroup);

            // Fire Particles
            for(let i = 0; i < 100; i++) {
                const p = new THREE.Mesh(new THREE.IcosahedronGeometry(0.02), materials.blueFire.clone());
                scene.add(p);
                fireParticles.push({
                    mesh: p,
                    owner: i < 50 ? 0 : 1,
                    angle: Math.random() * Math.PI * 2,
                    radius: 0.12,
                    speed: 0.03 + Math.random() * 0.05
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            fireParticles.forEach((p) => {
                const fPos = new THREE.Vector3();
                fireSystem[p.owner].source.getWorldPosition(fPos);
                p.angle += p.speed;
                p.mesh.position.x = fPos.x + Math.cos(p.angle) * p.radius;
                p.mesh.position.y = fPos.y + Math.sin(t * 4 + p.angle) * 0.1;
                p.mesh.position.z = fPos.z + Math.sin(p.angle) * p.radius;
                p.mesh.material.opacity = 0.4 + Math.sin(t * 5) * 0.4;
            });

            eyes.forEach(e => e.scale.y = (Math.sin(t * 2) > 0.97) ? 0.1 : 1);

            renderer.render(scene, camera);
        }

        function listenOutfit() {
            onValue(ref(db, 'player/outfit'), (snapshot) => {
                const d = snapshot.val();
                if (d) {
                    if(d.skin) materials.skin.color.setHex(d.skin);
                    if(d.eyes) {
                        const c = new THREE.Color(d.eyes);
                        materials.neonEyes.color = c;
                        mouth.material.color = c;
                    }
                }
            });
        }

        // Sign In
        signinBtn.addEventListener('click', () => {
            import("https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js").then(() => {
                const auth = firebase.auth();
                const provider = new firebase.auth.GoogleAuthProvider();
                
                auth.signInWithPopup(provider).then((result) => {
                    playerId = result.user.uid;
                    playerName = result.user.displayName || "NeonNinja";
                    
                    statusText.textContent = "Signed In Successfully! Your skin is ready.";
                    signinBtn.style.display = 'none';
                    startBtn.style.display = 'block';
                }).catch((error) => {
                    console.error(error);
                    statusText.textContent = "Sign in failed. Please try again.";
                });
            });
        });

        // Start Game → Directly goes to index.html
        startBtn.addEventListener('click', () => {
            if (!playerId) {
                alert("Please sign in with Google first!");
                return;
            }
            window.location.href = 'index.html';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
